version: 2

updates:
  - package-ecosystem: gomod
    directory: /server
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(go):"
    labels:
      - dependencies
      - go
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /static
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(npm):"
    labels:
      - dependencies
      - npm
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(actions):"
    labels:
      - dependencies
      - ci
    open-pull-requests-limit: 5
